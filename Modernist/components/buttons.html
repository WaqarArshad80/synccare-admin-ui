<!-- @dsCard group="Components" name="Buttons & tags" subtitle="Solid primary actions; tags tint from the ramps" viewport="640x460" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modernist — Buttons &amp; tags</title>
<link rel="stylesheet" href="../styles.css" />
<style>
/* Demo scaffolding only — everything visual comes from ../styles.css. */
.demo { max-width: 620px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
.demo-head {
  font-family: var(--font-body); font-size: 11px; font-weight: inherit;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55;
  margin: var(--space-6) 0 var(--space-3);
}
.demo-head:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.stack { display: grid; gap: var(--space-3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.note { font-size: 12px; opacity: 0.6; max-width: 60ch; }
code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.92em; }
</style>
</head>
<body>
<main class="demo">
<div class="demo-head">Buttons</div>
  <div class="row">
    <button type="button" class="btn btn-primary">Continue<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
    <button type="button" class="btn btn-secondary">Preview</button>
    <button type="button" class="btn btn-ghost">Learn more</button>
    <button type="button" class="btn btn-secondary" disabled>Disabled</button>
  </div>
  <div class="demo-head">Icon buttons</div>
  <div class="row">
    <button type="button" class="btn btn-primary btn-icon" aria-label="New"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg></button>
    <button type="button" class="btn btn-secondary btn-icon" aria-label="Stack"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/></svg></button>
    <button type="button" class="btn btn-ghost btn-icon" aria-label="Forward"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
  </div>
  <div class="demo-head">Full-width</div>
  <button type="button" class="btn btn-primary btn-block">Create project<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
  <div class="demo-head">Tags</div>
  <div class="row">
    <span class="tag tag-accent">Accent · tinted</span>
    <span class="tag tag-outline">Accent · outlined</span>
    
    <span class="tag tag-neutral">Neutral</span>
  </div>
  <p class="note">The primary action is a solid accent fill, and labels in wide buttons sit flush left. Hover and pressed states come from the accent ramp; keyboard focus is the accent <code>:focus-visible</code> ring.</p>
</main>
</body>
</html>
