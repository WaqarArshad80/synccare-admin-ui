<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modernist — Icons</title>
<link rel="stylesheet" href="../styles.css" />
<style>
/* Demo scaffolding only — everything visual comes from ../styles.css. */
.demo { max-width: 620px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
.demo-head {
  font-family: var(--font-body); font-size: 11px; font-weight: inherit;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55;
  margin: var(--space-6) 0 var(--space-3);
}
.demo-head:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.stack { display: grid; gap: var(--space-3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.note { font-size: 12px; opacity: 0.6; max-width: 60ch; }
code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.92em; }
.icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: var(--space-2); }
.icg { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: var(--space-2) 0; }
.icg svg { display: block; }
.icg i { font-style: normal; font-size: 10px; letter-spacing: 0.02em; opacity: 0.55; }
</style>
</head>
<body>
<main class="demo">
<div class="demo-head">Lucide</div>

e="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg><i>folder</i></span></div>
  <div class="demo-head">Usage</div>
  <p class="note">Use Lucide (https://lucide.dev) throughout. Inline the SVG and leave <code>stroke</code>/<code>fill</code> on <code>currentColor</code> so icons take their color from the text around them.</p>
</main>
</body>
</html>
