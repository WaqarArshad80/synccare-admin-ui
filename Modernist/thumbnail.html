<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Modernist — thumbnail</title>
<link rel="stylesheet" href="styles.css" />
<style>
/* Thumbnail (1280×854): brand mark left, swatch strip right. */
html, body { height: 100%; }
body { margin: 0; display: flex; background: var(--color-accent); }
.mark { flex: 1; display: flex; align-items: flex-end; padding: 56px; overflow: hidden; }
.mark h1 {
  margin: 0; color: var(--color-bg); font-size: 115px;
  line-height: 0.94; letter-spacing: -0.03em; white-space: nowrap;
}
.strip { width: 25%; display: flex; flex-direction: column; }
.strip i { flex: 1; }
</style>
</head>
<body>
<div class="mark"><h1>Modernist</h1></div>
<aside class="strip"><i style="background: var(--color-accent-300)"></i><i style="background: var(--color-accent-400)"></i><i style="background: var(--color-accent-700)"></i><i style="background: var(--color-neutral-800)"></i></aside>
</body>
</html>
